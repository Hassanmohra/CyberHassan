<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberHassan | Security Terminal</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --neon-red: #ff0000;
            --neon-blue: #0044cc;
            --neon-cyan: #00cccc;
            --neon-yellow: #ffaa00;
            --instagram: #e1306c;
            --facebook: #1877f2;
            --whatsapp: #25d366;
            --telegram: #0088cc;
            --snapchat: #fffc00;
            --video-chat: #9b59b6;
            --games: #f39c12;
        }

        body {
            background-color: #000;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.2;
        }

        .console-container {
            width: 95%;
            max-width: 900px;
            background-color: rgba(5, 5, 5, 0.9);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 68, 204, 0.3);
            border-radius: 8px;
            padding: 25px;
            box-sizing: border-box;
            margin: 20px;
        }

        .brand-name {
            color: var(--neon-red);
            font-size: clamp(1.5em, 8vw, 3.5em);
            text-align: center;
            letter-spacing: clamp(5px, 2vw, 10px);
            margin: 0;
            text-shadow: 0 0 15px var(--neon-red);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        .status-bar {
            background: #111;
            border: 1px solid #333;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.75em;
            margin-bottom: 20px;
            direction: ltr;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .service-btn {
            padding: 12px;
            background: transparent;
            font-weight: bold;
            font-size: 0.85em;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
            border: 1px solid #444;
        }

        .btn-ig { color: var(--instagram); border-color: var(--instagram); }
        .btn-fb { color: var(--facebook); border-color: var(--facebook); }
        .btn-wa { color: var(--whatsapp); border-color: var(--whatsapp); }
        .btn-tg { color: var(--telegram); border-color: var(--telegram); }
        .btn-snap { color: var(--snapchat); border-color: var(--snapchat); }
        .btn-video { color: var(--video-chat); border-color: var(--video-chat); }
        .btn-games { color: var(--games); border-color: var(--games); }

        .service-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #050505;
            border: 2px solid var(--neon-cyan);
            padding: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 20px var(--neon-cyan);
            position: relative;
        }

        .close-modal {
            color: var(--neon-red);
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 30px;
            cursor: pointer;
        }

        .menu-item {
            display: block;
            padding: 15px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #333;
            color: #eee;
            text-decoration: none;
            text-align: right;
            transition: 0.2s;
        }

        .menu-item:hover {
            border-color: var(--neon-green);
            background: #1a1a1a;
        }

        .id-input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-align: center;
        }

        .main-btn {
            display: block;
            background: var(--neon-red);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 0 15px var(--neon-red);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <!-- النافذة المنبثقة الديناميكية -->
    <div id="serviceModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--neon-cyan); border-bottom: 1px solid var(--neon-cyan); padding-bottom: 10px; text-align: center;"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="console-container">
        <h1 class="brand-name">CYBERHASSAN</h1>
        <div style="text-align:center; color:var(--neon-cyan); margin-bottom:20px; font-weight:bold;">نظام الخدمات التقنية المتكامل</div>

        <div class="status-bar">
            <span>NETWORK: SECURE</span>
            <span id="uptime">UPTIME: 00:00:00</span>
            <span>GAZA: ACTIVE</span>
        </div>

        <div class="services-grid">
            <div class="service-btn btn-ig" onclick="openService('ig')">خدمات انستغرام</div>
            <div class="service-btn btn-fb" onclick="openService('fb')">خدمات فيسبوك</div>
            <div class="service-btn btn-wa" onclick="openService('wa')">خدمات واتساب</div>
            <div class="service-btn btn-tg" onclick="openService('tg')">خدمات تيليجرام</div>
            <div class="service-btn btn-snap" onclick="openService('snap')">خدمات سناب شات</div>
            <div class="service-btn btn-video" onclick="openService('video')">دردشة الفيديو</div>
            <div class="service-btn btn-games" onclick="openService('games')">خدمات الألعاب</div>
        </div>

        <a href="https://www.instagram.com/ha77an_x220" target="_blank" class="main-btn">تواصل مباشر مع الدعم الفني [!]</a>

        <div id="log-display" style="text-align:center; font-size:0.7em; color:#555; margin-top:20px;">> Terminal Ready...</div>
        <div style="text-align:center; font-size:0.6em; color:#222; margin-top:10px;">© 2026 CYBERHASSAN | KHAN YUNIS</div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        const drops = Array(Math.floor(canvas.width/15)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#003300"; ctx.font = "15px arial";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i * 15, y * 15);
                if (y * 15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        // Uptime Counter
        let sec = 0;
        setInterval(() => {
            sec++;
            let h = Math.floor(sec/3600).toString().padStart(2,'0');
            let m = Math.floor((sec%3600)/60).toString().padStart(2,'0');
            let s = (sec%60).toString().padStart(2,'0');
            document.getElementById('uptime').innerText = `UPTIME: ${h}:${m}:${s}`;
        }, 1000);

        // Service Modal Logic
        const services = {
            ig: { title: "خدمات انستغرام", items: ["توثيق حساب انستغرام بالعلامة الزرقاء", "زيادة لايكات + متابعين + تعليقات"] },
            fb: { title: "خدمات فيسبوك", items: ["توثيق حساب فيسبوك بالعلامة الزرقاء", "زيادة لايكات + متابعين + تعليقات"] },
            wa: { title: "خدمات واتساب", items: ["تأمين حساب واتساب"] },
            tg: { title: "خدمات تيليجرام", items: ["تخطي الدفع في تيليجرام", "توثيق حساب تيليجرام بالعلامة الزرقاء", "شحن نجوم تيليجرام"] },
            snap: { title: "خدمات سناب شات", items: ["توثيق حساب سناب شات بالعلامة الزرقاء"] },
            video: { title: "دردشة الفيديو", items: ["شحن كوينزات"], hasID: true },
            games: { title: "خدمات الألعاب", items: ["شحن شدات / كوينزات / جواهر"], hasID: true }
        };

        function openService(key) {
            const data = services[key];
            document.getElementById('modalTitle').innerText = data.title;
            let html = data.items.map(item => `<a href="https://www.instagram.com/ha77an_x220" target="_blank" class="menu-item">> ${item}</a>`).join('');
            if(data.hasID) {
                html += `<div style="margin-top:20px; color:var(--neon-green); text-align:center;">يرجى إدخال الـ ID الخاص بك:</div>
                         <input type="text" class="id-input" placeholder="Enter ID here...">
                         <a href="https://www.instagram.com/ha77an_x220" target="_blank" class="menu-item" style="text-align:center; background:var(--neon-blue); margin-top:15px;">تأكيد وطلب الشحن</a>`;
            }
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('serviceModal').style.display = "flex";
        }

        function closeModal() { document.getElementById('serviceModal').style.display = "none"; }
    </script>
</body>
</html>
